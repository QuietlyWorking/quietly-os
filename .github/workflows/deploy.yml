name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Em-dash scrub
        run: npm run em-dash-scrub

      - name: Build
        run: npm run build
        env:
          PUBLIC_QOS_SUPABASE_URL: ${{ secrets.PUBLIC_QOS_SUPABASE_URL }}
          PUBLIC_QOS_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_QOS_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=quietly-os --branch=main
