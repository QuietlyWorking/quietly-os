<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-grad" cx="30%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#0a0e14" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050708" stop-opacity="1"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2d3744" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Concentric rings on the right -->
  <g transform="translate(940, 315)" opacity="0.95">
    <circle cx="0" cy="0" r="165" fill="none" stroke="#0d9488" stroke-width="2" opacity="0.35"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#0d9488" stroke-width="2.4" opacity="0.55"/>
    <circle cx="0" cy="0" r="62" fill="none" stroke="#0d9488" stroke-width="3" opacity="0.8"/>
    <circle cx="0" cy="0" r="18" fill="#d9a752"/>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="22" height="22" rx="3" fill="none" stroke="#64748b" stroke-width="1.4"/>
    <circle cx="11" cy="11" r="8" fill="none" stroke="#0d9488" stroke-width="1.4"/>
    <circle cx="11" cy="11" r="4.2" fill="none" stroke="#0d9488" stroke-width="1.4"/>
    <circle cx="11" cy="11" r="1.4" fill="#d9a752"/>
    <text x="40" y="10" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#94a3b8" letter-spacing="3">QUIETLY OPERATING STANDARD</text>
    <text x="40" y="28" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#64748b" letter-spacing="2">v1.0.0 · VALUES LAYER · 2026-04-22</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 245)">
    <text font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif" font-size="76" font-weight="500" fill="#ebf0f5">
      <tspan x="0" y="0">Be who you are.</tspan>
      <tspan x="0" y="92" fill="#d9a752">Even when the machines</tspan>
      <tspan x="0" y="178" fill="#d9a752">speak for you.</tspan>
    </text>
  </g>

  <!-- Footer strip -->
  <g transform="translate(80, 560)">
    <line x1="0" y1="-18" x2="620" y2="-18" stroke="#2d3744" stroke-width="1"/>
    <text x="0" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a5afb9" font-weight="400">
      quietlyos.org
    </text>
    <text x="1120" y="8" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#64748b" letter-spacing="2">
      QUIETLY WORKING FOUNDATION · 501(c)(3)
    </text>
  </g>
</svg>
